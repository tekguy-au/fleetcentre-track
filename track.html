<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FleetCentre · Track</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cold: #D4654A;
    --frost: #F0C4B5;
    --dark: #1A1A1A;
    --ice: #FAFAFA;
    --green: #27AE60;
    --text: #F0F4F8;
    --muted: #9B948C;

    --bg: var(--dark);
    --panel-rgb: 13,27,42;
    --text-c: var(--text);
    --muted-c: var(--muted);
    --accent-c: var(--frost);
    --pill-bg: rgba(255,255,255,0.08);
    --pill-border: rgba(168,213,234,0.2);
    --ring-track: rgba(168,213,234,0.2);
  }
  body.day {
    --bg: var(--ice);
    --panel-rgb: 232,244,248;
    --text-c: #1A1A1A;
    --muted-c: #8A8580;
    --accent-c: var(--cold);
    --pill-bg: rgba(13,27,42,0.06);
    --pill-border: rgba(13,27,42,0.12);
    --ring-track: rgba(13,27,42,0.15);
  }
  body { background: var(--bg); color: var(--text-c); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  #map { flex: 1; width: 100%; }

  .status-bar { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 12px 16px; display: flex; align-items: center; gap: 12px; background: linear-gradient(to bottom, rgba(var(--panel-rgb),0.95) 0%, rgba(var(--panel-rgb),0.7) 80%, transparent 100%); pointer-events: none; }
  .status-bar > * { pointer-events: auto; }
  .logo-mark { width: 32px; height: 32px; background: var(--cold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .logo-text { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-c); }
  .status-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .refresh-label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted-c); }
  .status-pill { display: flex; align-items: center; gap: 6px; background: var(--pill-bg); border: 1px solid var(--pill-border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent-c); backdrop-filter: blur(8px); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-c); transition: background 0.3s; }
  .status-dot.live { background: var(--green); animation: dotPulse 2s infinite; }
  .status-dot.delivered { background: var(--cold); animation: none; }
  @keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .info-card { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; background: linear-gradient(to top, rgba(var(--panel-rgb),0.97) 0%, rgba(var(--panel-rgb),0.85) 70%, transparent 100%); padding: 40px 20px 24px; pointer-events: none; display: none; }
  .info-card > * { pointer-events: auto; }
  .info-inner { max-width: 400px; margin: 0 auto; }
  .info-status { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .info-sub { font-size: 13px; color: var(--muted-c); margin-bottom: 16px; }
  .info-stats { display: flex; gap: 24px; }
  .info-stat-val { font-size: 16px; font-weight: 700; color: var(--accent-c); font-variant-numeric: tabular-nums; }
  .info-stat-lbl { font-size: 10px; color: var(--muted-c); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

  .overlay { position: absolute; inset: 0; z-index: 15; background: rgba(var(--panel-rgb),0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; backdrop-filter: blur(4px); }
  .overlay.hidden { display: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--ring-track); border-top-color: var(--cold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-title { font-size: 15px; font-weight: 600; color: var(--accent-c); }
  .overlay-sub { font-size: 13px; color: var(--muted-c); }
  .delivered-icon { font-size: 64px; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

  .pin-input { width: 140px; text-align: center; font-size: 22px; letter-spacing: 0.3em; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--pill-border); background: var(--pill-bg); color: var(--text-c); outline: none; }
  .pin-input:focus { border-color: var(--cold); }
  .pin-submit { padding: 10px 20px; border-radius: 8px; border: none; background: var(--cold); color: #FFFFFF; font-size: 14px; font-weight: 600; cursor: pointer; }
  .pin-error { font-size: 12px; color: #E74C3C; height: 16px; }
</style>
</head>
<body>

<div id="map"></div>

<div class="status-bar">
  <div class="logo-mark"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><line x1="4.2" y1="6" x2="19.8" y2="18"/><line x1="19.8" y1="6" x2="4.2" y2="18"/><path d="M12 2l-2 2M12 2l2 2M12 22l-2-2M12 22l2-2"/><path d="M4.2 6l2.7-.3M4.2 6l.6 2.7M19.8 6l-2.7-.3M19.8 6l-.6 2.7"/><path d="M4.2 18l2.7.3M4.2 18l.6-2.7M19.8 18l-2.7.3M19.8 18l-.6-2.7"/></svg></div>
  <div class="logo-text">FleetCentre</div>
  <div class="status-right">
    <div class="refresh-label" id="refreshLabel">Refresh in 45s</div>
    <div class="status-pill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting</span>
    </div>
  </div>
</div>

<div class="info-card" id="infoCard">
  <div class="info-inner">
    <div class="info-status" id="infoStatus">On the way</div>
    <div class="info-sub" id="infoSub">Your delivery is en route</div>
    <div class="info-stats">
      <div><div class="info-stat-val" id="statSpeed">—</div><div class="info-stat-lbl">km/h</div></div>
      <div><div class="info-stat-val" id="statUpdated">—</div><div class="info-stat-lbl">Last update</div></div>
    </div>
  </div>
</div>

<div class="overlay" id="waitingOverlay">
  <div class="spinner"></div>
  <div class="overlay-title">Waiting for driver</div>
  <div class="overlay-sub">They'll appear on the map shortly</div>
</div>

<div class="overlay hidden" id="deliveredOverlay">
  <div class="delivered-icon">✅</div>
  <div class="overlay-title" style="font-size:22px;">Delivered</div>
  <div class="overlay-sub">Your delivery is complete</div>
</div>

<div class="overlay hidden" id="pinOverlay">
  <div class="overlay-title">Fleet view</div>
  <div class="overlay-sub">Enter PIN to continue</div>
  <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off">
  <button class="pin-submit" id="pinSubmit">Unlock</button>
  <div class="pin-error" id="pinError"></div>
</div>

<script>
const API = 'https://n8n.tekguy.au/webhook';
const sessionId = new URLSearchParams(window.location.search).get('id');
const fleetMode = !sessionId;

if (fleetMode) {
  document.getElementById('waitingOverlay').innerHTML = '<div class="overlay-title">Loading fleet…</div><div class="overlay-sub">Fetching active drivers</div>';
}

let map, marker, pollTimer;
let currentPos = null;
let lastUpdateTs = null;
let fleetMarkers = {};
let fleetData = {};
let hoverInfo;

const VEHICLE_NAMES = ['Reefer Van 04', 'Cold Chain Sprinter', 'Iveco Daily Reefer', 'Fuso Canter Freezer', 'Hyundai Porter Cold', 'Reefer Van 11'];
const DRIVER_NAMES = ['J. Ashford', 'M. Delacroix', 'R. Okafor', 'T. Nguyen', 'S. Whitfield', 'K. Marchetti'];

function hashId(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return h;
}

function fakeRego(id) {
  const h = hashId(id);
  const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const l = [0, 1, 2].map(i => letters[(h >> (i * 5)) % letters.length]).join('');
  const n = 100 + (h % 900);
  return `${l}-${n}`;
}

function fleetInfoContent(id) {
  const s = fleetData[id] || {};
  const vehicle = VEHICLE_NAMES[hashId(id) % VEHICLE_NAMES.length];
  const driver = s.name || DRIVER_NAMES[hashId(id + 'd') % DRIVER_NAMES.length];
  const speed = s.speed != null ? `${s.speed} km/h` : '—';
  return `<div style="font-family:-apple-system,sans-serif;font-size:13px;line-height:1.5;color:#1A1A1A;min-width:170px;">
    <div style="font-weight:700;margin-bottom:2px;">${vehicle}</div>
    <div style="color:#8A8580;font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Rego ${fakeRego(id)}</div>
    <div>Driver: <b>${driver}</b></div>
    <div>Speed: <b>${speed}</b></div>
  </div>`;
}

const darkStyle = [
  { elementType: 'geometry', stylers: [{ color: '#1A1A1A' }] },
  { elementType: 'labels.text.stroke', stylers: [{ color: '#1A1A1A' }] },
  { elementType: 'labels.text.fill', stylers: [{ color: '#6B6B6B' }] },
  { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#2A2A2A' }] },
  { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#333333' }] },
  { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#27AE60' }] },
  { featureType: 'road.highway', elementType: 'geometry.stroke', stylers: [{ color: '#1E8449' }] },
  { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#101010' }] },
  { featureType: 'poi', stylers: [{ visibility: 'off' }] },
  { featureType: 'transit', stylers: [{ visibility: 'off' }] },
];

const lightStyle = [
  { elementType: 'geometry', stylers: [{ color: '#FAFAFA' }] },
  { elementType: 'labels.text.stroke', stylers: [{ color: '#FFFFFF' }] },
  { elementType: 'labels.text.fill', stylers: [{ color: '#8A8580' }] },
  { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#FFFFFF' }] },
  { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#E5E5E5' }] },
  { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#27AE60' }] },
  { featureType: 'road.highway', elementType: 'geometry.stroke', stylers: [{ color: '#A9DFC5' }] },
  { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#F0C4B5' }] },
  { featureType: 'poi', stylers: [{ visibility: 'off' }] },
  { featureType: 'transit', stylers: [{ visibility: 'off' }] },
];

const MARKER_ICON = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="20" fill="#D4654A" stroke="#FFFFFF" stroke-width="3"/>
    <g stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round">
      <line x1="24" y1="14" x2="24" y2="34"/>
      <line x1="15.3" y1="19" x2="32.7" y2="29"/>
      <line x1="32.7" y1="19" x2="15.3" y2="29"/>
    </g>
  </svg>`
);

const PIRATE_ICON = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
    <line x1="14" y1="6" x2="14" y2="42" stroke="#5C4A3A" stroke-width="3" stroke-linecap="round"/>
    <path d="M14 8 L41 16 L14 25 Z" fill="#111111" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
    <g transform="translate(23,16.5)">
      <circle r="4.2" fill="#FFFFFF"/>
      <circle cx="-1.6" cy="-1" r="0.9" fill="#111111"/>
      <circle cx="1.6" cy="-1" r="0.9" fill="#111111"/>
      <path d="M-1.8 2.2 Q0 3.6 1.8 2.2" stroke="#111111" stroke-width="0.8" fill="none"/>
      <line x1="-5.5" y1="5" x2="5.5" y2="-3" stroke="#FFFFFF" stroke-width="1.1"/>
      <line x1="-5.5" y1="-3" x2="5.5" y2="5" stroke="#FFFFFF" stroke-width="1.1"/>
    </g>
  </svg>`
);

function isRuss(name) {
  return !!name && name.trim().toLowerCase() === 'russ';
}

function buildFlagIcon(color) {
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
      <line x1="14" y1="6" x2="14" y2="42" stroke="#5C4A3A" stroke-width="3" stroke-linecap="round"/>
      <path d="M14 8 L41 16 L14 25 Z" fill="${color}" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>`
  );
}

const AUTO_FLAG_PALETTE = ['#F1C40F', '#9B59B6', '#D4654A', '#FF6B2B', '#16A085', '#E67E22', '#3498DB', '#8E44AD'];
const fleetColorAssignments = {};

function assignAutoColor(id) {
  const used = new Set(Object.values(fleetColorAssignments));
  const available = AUTO_FLAG_PALETTE.filter(c => !used.has(c));
  const pool = available.length ? available : AUTO_FLAG_PALETTE;
  const color = pool[Math.floor(Math.random() * pool.length)];
  fleetColorAssignments[id] = color;
  return color;
}

function fleetIcon(s) {
  if (s.flag === 'red') return buildFlagIcon('#E74C3C');
  if (s.flag === 'green') return buildFlagIcon('#27AE60');
  if (isRuss(s.name)) return PIRATE_ICON;
  return buildFlagIcon(fleetColorAssignments[s.id] || assignAutoColor(s.id));
}

function isDaytime() {
  const hour = new Date().getHours();
  return hour >= 6 && hour < 18;
}

const daytime = isDaytime();
document.body.classList.toggle('day', daytime);

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    zoom: 13,
    minZoom: 11,
    maxZoom: 18,
    center: { lat: -37.8136, lng: 144.9631 },
    styles: daytime ? lightStyle : darkStyle,
    disableDefaultUI: true,
    scaleControl: true,
    gestureHandling: 'greedy',
  });
  if (fleetMode) {
    hoverInfo = new google.maps.InfoWindow();
    document.getElementById('waitingOverlay').classList.add('hidden');
    document.getElementById('pinOverlay').classList.remove('hidden');
    document.getElementById('pinInput').focus();
  } else {
    poll();
    resetRefreshCountdown();
    pollTimer = setInterval(() => { poll(); resetRefreshCountdown(); }, 45000);
  }
}

function startFleet() {
  document.getElementById('waitingOverlay').innerHTML = '<div class="overlay-title">Loading fleet…</div><div class="overlay-sub">Fetching active drivers</div>';
  document.getElementById('waitingOverlay').classList.remove('hidden');
  pollFleet();
  resetRefreshCountdown();
  pollTimer = setInterval(() => { pollFleet(); resetRefreshCountdown(); }, 45000);
}

let refreshSecondsLeft = 45;
function resetRefreshCountdown() { refreshSecondsLeft = 45; }
setInterval(() => {
  if (refreshSecondsLeft <= 0) return;
  refreshSecondsLeft--;
  const el = document.getElementById('refreshLabel');
  if (el) el.textContent = `Refresh in ${refreshSecondsLeft}s`;
}, 1000);

function tryPin() {
  const val = document.getElementById('pinInput').value.trim();
  if (val === '1092') {
    document.getElementById('pinOverlay').classList.add('hidden');
    startFleet();
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

if (fleetMode) {
  document.getElementById('pinSubmit').addEventListener('click', tryPin);
  document.getElementById('pinInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryPin();
  });
}

async function pollFleet() {
  try {
    const res = await fetch(`${API}/cold-list`);
    const data = await res.json();
    const sessions = data.sessions || [];

    document.getElementById('waitingOverlay').classList.toggle('hidden', sessions.length > 0);
    if (sessions.length === 0) {
      document.getElementById('waitingOverlay').innerHTML = '<div class="overlay-title">No active drivers</div><div class="overlay-sub">Check back shortly</div>';
    }
    document.getElementById('statusDot').className = sessions.length ? 'status-dot live' : 'status-dot';
    document.getElementById('statusText').textContent = sessions.length ? `${sessions.length} active` : 'No drivers';

    const seen = new Set();
    const bounds = new google.maps.LatLngBounds();
    let markersChanged = false;

    sessions.forEach(s => {
      seen.add(s.id);
      const pos = { lat: s.lat, lng: s.lng };
      bounds.extend(pos);
      fleetData[s.id] = s;

      if (!fleetMarkers[s.id]) {
        const m = new google.maps.Marker({
          position: pos,
          map: map,
          icon: { url: fleetIcon(s), scaledSize: new google.maps.Size(40, 40), anchor: new google.maps.Point(12, 38) },
        });
        m.addListener('mouseover', () => {
          hoverInfo.setContent(fleetInfoContent(s.id));
          hoverInfo.open(map, m);
        });
        m.addListener('mouseout', () => hoverInfo.close());
        fleetMarkers[s.id] = m;
        markersChanged = true;
      } else {
        smoothMove(fleetMarkers[s.id], pos);
      }
    });

    Object.keys(fleetMarkers).forEach(id => {
      if (!seen.has(id)) {
        fleetMarkers[id].setMap(null);
        delete fleetMarkers[id];
        delete fleetData[id];
        delete fleetColorAssignments[id];
        markersChanged = true;
      }
    });

    if (sessions.length === 1 && markersChanged) {
      map.setCenter(bounds.getCenter());
      map.setZoom(14);
    } else if (sessions.length > 1 && markersChanged) {
      map.fitBounds(bounds, 60);
    }
  } catch (e) {}
}

async function poll() {
  try {
    const res = await fetch(`${API}/cold-poll?id=${sessionId}`);
    const data = await res.json();

    if (data.error) return;
    if (data.status === 'preparing' || !data.lat) return;

    if (data.status === 'delivered') {
      clearInterval(pollTimer);
      document.getElementById('statusDot').className = 'status-dot delivered';
      document.getElementById('statusText').textContent = 'Delivered';
      document.getElementById('infoCard').style.display = 'none';
      document.getElementById('waitingOverlay').classList.add('hidden');
      document.getElementById('deliveredOverlay').classList.remove('hidden');
      return;
    }

    document.getElementById('waitingOverlay').classList.add('hidden');
    document.getElementById('infoCard').style.display = '';
    document.getElementById('statusDot').className = 'status-dot live';
    document.getElementById('statusText').textContent = 'Live';
    document.getElementById('statSpeed').textContent = data.speed || '0';

    const pos = { lat: data.lat, lng: data.lng };

    if (!marker) {
      marker = new google.maps.Marker({
        position: pos,
        map: map,
        icon: {
          url: MARKER_ICON,
          scaledSize: new google.maps.Size(48, 48),
          anchor: new google.maps.Point(24, 24),
        },
      });
      map.panTo(pos);
      map.setZoom(14);
    } else {
      smoothMove(marker, pos);
      map.panTo(pos);
    }

    lastUpdateTs = data.ts;

    if (data.speed !== null && data.speed < 5) {
      document.getElementById('infoStatus').textContent = 'Arriving soon';
      document.getElementById('infoSub').textContent = 'Driver is nearby';
    } else {
      document.getElementById('infoStatus').textContent = 'On the way';
      document.getElementById('infoSub').textContent = 'Your delivery is en route';
    }
  } catch (e) {}
}

function smoothMove(marker, target) {
  const start = marker.getPosition().toJSON();
  const startTime = Date.now();
  const duration = 44000;

  function step() {
    const t = Math.min((Date.now() - startTime) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    marker.setPosition({
      lat: start.lat + (target.lat - start.lat) * ease,
      lng: start.lng + (target.lng - start.lng) * ease,
    });
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

setInterval(() => {
  if (!lastUpdateTs) return;
  const ago = Math.round((Date.now() - lastUpdateTs) / 1000);
  document.getElementById('statUpdated').textContent = ago < 5 ? 'Just now' : ago < 60 ? `${ago}s ago` : `${Math.floor(ago/60)}m ago`;
}, 1000);
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBpadAI6jvcE_3L_EtjV3IrTRKaOO-D984&v=weekly&callback=initMap"></script>
</body>
</html>
