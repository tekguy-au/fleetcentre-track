<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FleetCentre · Driver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ice: #FAFAFA;
    --cold: #D4654A;
    --frost: #F0C4B5;
    --dark: #1A1A1A;
    --mid: #2C3E50;
    --accent: #FF6B2B;
    --green: #27AE60;
    --red: #E74C3C;
    --text: #F0F4F8;
    --muted: #9B948C;
  }

  body {
    background: var(--ice);
    color: #1A1A1A;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--cold);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cold);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 32px;
  }

  .status-ring {
    position: relative;
    width: 160px;
    height: 160px;
  }

  .status-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: rgba(0,0,0,0.08); stroke-width: 6; }
  .ring-fill {
    fill: none;
    stroke: var(--cold);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 408;
    stroke-dashoffset: 408;
    transition: stroke-dashoffset 0.6s ease, stroke 0.3s ease;
  }

  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .ring-icon { font-size: 32px; }

  .ring-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }

  .stat-card {
    background: rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 14px;
    padding: 16px;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--cold);
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .share-box {
    width: 100%;
    max-width: 320px;
    background: rgba(212,101,74,0.08);
    border: 1px solid rgba(212,101,74,0.35);
    border-radius: 14px;
    padding: 16px;
    display: none;
  }

  .share-box.visible { display: block; }

  .share-label {
    font-size: 11px;
    color: var(--cold);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .share-url {
    font-size: 13px;
    color: #1A1A1A;
    word-break: break-all;
    line-height: 1.4;
    font-family: 'SF Mono', monospace;
    margin-bottom: 12px;
  }

  .copy-btn {
    background: var(--cold);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.03em;
  }

  .copy-btn:active { opacity: 0.8; }

  .actions {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-primary {
    background: var(--cold);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform 0.1s, opacity 0.2s;
  }

  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1.5px solid var(--red);
    border-radius: 16px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: background 0.2s;
  }

  .btn-danger.visible { display: block; }
  .btn-danger:active { background: rgba(231,76,60,0.1); }

  .btn-stop {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid rgba(0,0,0,0.15);
    border-radius: 16px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: background 0.2s;
  }

  .btn-stop.visible { display: block; }
  .btn-stop:active { background: rgba(0,0,0,0.05); }

  .pulse {
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .conn-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
  }
  .conn-dot.live { background: var(--green); }

  footer {
    padding: 16px 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  .pin-overlay { position: fixed; inset: 0; z-index: 50; background: var(--ice); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .pin-overlay.hidden { display: none; }
  .pin-title { font-size: 15px; font-weight: 600; color: #1A1A1A; }
  .pin-sub { font-size: 13px; color: var(--muted); }
  .pin-input { width: 140px; text-align: center; font-size: 22px; letter-spacing: 0.3em; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: rgba(0,0,0,0.03); color: #1A1A1A; outline: none; }
  .pin-input:focus { border-color: var(--cold); }
  .pin-submit { padding: 10px 20px; border-radius: 8px; border: none; background: var(--cold); color: #FFFFFF; font-size: 14px; font-weight: 600; cursor: pointer; }
  .pin-error { font-size: 12px; color: var(--red); height: 16px; }
</style>
</head>
<body>

<div class="pin-overlay" id="pinOverlay">
  <div class="pin-title">Driver access</div>
  <div class="pin-sub">Enter PIN to continue</div>
  <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="off">
  <button class="pin-submit" id="pinSubmit">Unlock</button>
  <div class="pin-error" id="pinError"></div>
</div>

<header>
  <div class="logo-mark"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><line x1="4.2" y1="6" x2="19.8" y2="18"/><line x1="19.8" y1="6" x2="4.2" y2="18"/><path d="M12 2l-2 2M12 2l2 2M12 22l-2-2M12 22l2-2"/><path d="M4.2 6l2.7-.3M4.2 6l.6 2.7M19.8 6l-2.7-.3M19.8 6l-.6 2.7"/><path d="M4.2 18l2.7.3M4.2 18l.6-2.7M19.8 18l-2.7.3M19.8 18l-.6-2.7"/></svg></div>
  <div>
    <div class="logo-text">FleetCentre</div>
    <div class="logo-sub">Driver</div>
  </div>
</header>

<main>
  <div class="status-ring">
    <svg viewBox="0 0 140 140">
      <circle class="ring-bg" cx="70" cy="70" r="65"/>
      <circle class="ring-fill" id="ringFill" cx="70" cy="70" r="65"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-icon" id="ringIcon">🚐</div>
      <div class="ring-label" id="ringLabel">Ready</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="statUpdates">—</div>
      <div class="stat-lbl">Updates sent</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statSpeed">—</div>
      <div class="stat-lbl">km/h</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAccuracy">—</div>
      <div class="stat-lbl">GPS accuracy</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statConn">
        <span class="conn-dot" id="connDot"></span>—
      </div>
      <div class="stat-lbl">Connection</div>
    </div>
  </div>

  <div class="share-box" id="shareBox">
    <div class="share-label">Share tracking link</div>
    <div class="share-url" id="shareUrl"></div>
    <button class="copy-btn" onclick="copyLink()">Copy link</button>
  </div>

  <div class="actions">
    <button class="btn-primary" id="startBtn" onclick="startDelivery()">Start delivery</button>
    <button class="btn-danger" id="deliveredBtn" onclick="markDelivered()">Mark as delivered</button>
    <button class="btn-stop" id="stopBtn" onclick="stopDelivery()">Stop</button>
  </div>
</main>

<footer id="footerMsg">Location sharing off</footer>

<script>
const API = 'https://n8n.tekguy.au/webhook';
const TRACK_BASE = window.location.origin + '/track';
const DRIVER_PIN = '1092';

let sessionId = null;
let watchId = null;
let updateCount = 0;
let isLive = false;
let sendInterval = null;
let lastPos = null;
let wakeLock = null;

function tryPin() {
  const val = document.getElementById('pinInput').value.trim();
  if (val === DRIVER_PIN) {
    document.getElementById('pinOverlay').classList.add('hidden');
  } else {
    document.getElementById('pinError').textContent = 'Incorrect PIN';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

document.getElementById('pinSubmit').addEventListener('click', tryPin);
document.getElementById('pinInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryPin();
});
document.getElementById('pinInput').focus();

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {}
}

function releaseWakeLock() {
  if (wakeLock) {
    wakeLock.release().catch(() => {});
    wakeLock = null;
  }
}

document.addEventListener('visibilitychange', () => {
  if (isLive && document.visibilityState === 'visible') acquireWakeLock();
});

async function startDelivery() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('ringLabel').textContent = 'Starting…';

  try {
    const res = await fetch(`${API}/cold-update`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'create', name: DRIVER_PIN })
    });
    const { id } = await res.json();
    sessionId = id;

    document.getElementById('shareUrl').textContent = `${TRACK_BASE}?id=${id}`;
    document.getElementById('shareBox').classList.add('visible');

    setConnected(true);
    startGPS();
  } catch (e) {
    alert('Could not start session.');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('ringLabel').textContent = 'Ready';
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    alert('Geolocation not supported on this device.');
    return;
  }

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude: lat, longitude: lng, speed, accuracy, heading } = pos.coords;
      lastPos = {
        lat, lng,
        heading: heading || null,
        speed: speed ? Math.round(speed * 3.6) : null
      };

      document.getElementById('statSpeed').textContent = lastPos.speed || '0';
      document.getElementById('statAccuracy').textContent = accuracy ? `${Math.round(accuracy)}m` : '—';

      if (!isLive) {
        isLive = true;
        setLiveState();
        sendLocation();
        sendInterval = setInterval(sendLocation, 45000);
      }
    },
    (err) => {
      document.getElementById('footerMsg').textContent = `GPS error: ${err.message}`;
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

async function sendLocation() {
  if (!lastPos || !sessionId) return;
  try {
    await fetch(`${API}/cold-update`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'location', id: sessionId, ...lastPos })
    });
    updateCount++;
    document.getElementById('statUpdates').textContent = updateCount;
    animateRing();
  } catch (e) {
    setConnected(false);
  }
}

function setLiveState() {
  document.getElementById('ringIcon').textContent = '🚐';
  document.getElementById('ringLabel').textContent = 'Live';
  document.getElementById('startBtn').textContent = 'Delivering…';
  document.getElementById('startBtn').disabled = true;
  document.getElementById('deliveredBtn').classList.add('visible');
  document.getElementById('stopBtn').classList.add('visible');
  document.getElementById('footerMsg').textContent = 'Streaming live location';
  acquireWakeLock();
}

function setConnected(ok) {
  const dot = document.getElementById('connDot');
  const val = document.getElementById('statConn');
  if (ok) {
    dot.classList.add('live');
    val.innerHTML = '<span class="conn-dot live"></span>Live';
  } else {
    dot.classList.remove('live');
    val.innerHTML = '<span class="conn-dot"></span>Off';
  }
}

let ringTimeout;
function animateRing() {
  const ring = document.getElementById('ringFill');
  ring.style.stroke = '#27AE60';
  ring.style.strokeDashoffset = '0';
  clearTimeout(ringTimeout);
  ringTimeout = setTimeout(() => {
    ring.style.stroke = '#D4654A';
    ring.style.strokeDashoffset = '204';
  }, 800);
}

async function markDelivered() {
  if (!confirm('Mark this delivery as complete?')) return;

  await fetch(`${API}/cold-update`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'delivered', id: sessionId })
  }).catch(() => {});

  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  if (sendInterval) clearInterval(sendInterval);
  isLive = false;
  releaseWakeLock();

  document.getElementById('ringIcon').textContent = '✅';
  document.getElementById('ringLabel').textContent = 'Delivered';
  document.getElementById('deliveredBtn').classList.remove('visible');
  document.getElementById('stopBtn').classList.remove('visible');
  document.getElementById('startBtn').textContent = 'Start new delivery';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('shareBox').classList.remove('visible');
  document.getElementById('footerMsg').textContent = 'Delivery complete';
  updateCount = 0;
  sessionId = null;
  document.getElementById('startBtn').onclick = startDelivery;
}

function stopDelivery() {
  if (!confirm('Stop sharing your location? The customer will stop receiving updates.')) return;

  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  if (sendInterval) clearInterval(sendInterval);
  isLive = false;
  releaseWakeLock();

  document.getElementById('ringIcon').textContent = '🚐';
  document.getElementById('ringLabel').textContent = 'Ready';
  document.getElementById('ringFill').style.strokeDashoffset = '408';
  document.getElementById('deliveredBtn').classList.remove('visible');
  document.getElementById('stopBtn').classList.remove('visible');
  document.getElementById('startBtn').textContent = 'Start delivery';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('shareBox').classList.remove('visible');
  document.getElementById('footerMsg').textContent = 'Location sharing off';
  setConnected(false);
  updateCount = 0;
  document.getElementById('statUpdates').textContent = '—';
  sessionId = null;
}

function copyLink() {
  const url = document.getElementById('shareUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy link', 2000);
  });
}
</script>
</body>
</html>
